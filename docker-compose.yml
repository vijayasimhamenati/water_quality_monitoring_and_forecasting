version: "3.9"
services:
  backend:
    build: .
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 9090 --reload
    ports:
      - "9090:9090"
    volumes:
      - ./:/app
    environment:
      - API_URL=http://127.0.0.1:9090/api/v1/analyze

  frontend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:9090/api/v1/analyze
